version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: assetflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetflow
      POSTGRES_USER: assetflow_user
      POSTGRES_PASSWORD: assetflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow_user -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://assetflow_user:assetflow_pass@postgres:5432/assetflow
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ── Metabase Analytics ──────────────────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: assetflow_metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: assetflow
      MB_DB_PORT: 5432
      MB_DB_USER: assetflow_user
      MB_DB_PASS: assetflow_pass
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase-data:/metabase.db

volumes:
  pgdata:
    driver: local
  metabase-data:
    driver: local
